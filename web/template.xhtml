<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title><ui:insert name="title">Tecnologias Web</ui:insert></title>
        <h:outputStylesheet library="css" name="jsfcrud.css"/>
    </h:head>

    <h:body styleClass="layout-body">
        <p:growl id="growl" life="3000" />

        <!-- NORTE -->
        <div class="layout-north">
            <h1 class="app-title">TECNOLOGIAS WEB</h1>
        </div>

        <!-- CONTENEDOR PRINCIPAL (Oeste + Centro + Este) -->
        <div class="layout-middle">

            <!-- OESTE -->
            <div class="layout-west">
                <h:link outcome="/departamento/List" value="Departamento" styleClass="menu-link"/>
                <br/>
                <h:link outcome="/empleados/List"   value="Empleado"     styleClass="menu-link"/>
            </div>

            <!-- CENTRO -->
            <div class="layout-center">
                <p:panel id="mainPanel" header="#{bundle.AppName}">

                    <p:menubar styleClass="main-menubar">
                        <p:menuitem value="#{bundle.Home}"
                                    url="/TecnologiasWeb/faces/index.xhtml"
                                    icon="ui-icon-home"/>
                        <p:submenu label="#{bundle.Maintenance}">
                            <p:menuitem value="Departamento" outcome="/departamento/List"/>
                            <p:menuitem value="Empleados"    outcome="/empleados/List"/>
                        </p:submenu>
                    </p:menubar>

                    <ui:insert name="body">Contenido por defecto</ui:insert>

                </p:panel>
            </div>

            <!-- ESTE -->
            <div class="layout-east">
                right
            </div>

        </div>

        <!-- SUR -->
        <div class="layout-south">
            bottom
        </div>

    </h:body>

</html>
